services:
  backend:
    build:
      context: .
      dockerfile: infra/Dockerfile.backend
    environment:
      - PORT=4000
      - JWT_SECRET=change-me-in-prod-with-at-least-24-chars
      - INGEST_API_KEY=dev-ingest-key-very-strong
      - CORS_ORIGIN=http://localhost:8080
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB_NAME=socket
      - MONGO_LOG_COLLECTION=logs
      - REQUIRE_STRONG_SECRETS=true
      - BOOTSTRAP_ADMIN_USERNAME=admin
      - BOOTSTRAP_ADMIN_PASSWORD=admin123!
    ports:
      - "4000:4000"
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - mongo

  frontend:
    build:
      context: .
      dockerfile: infra/Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
